version: "3.8"

# Development-only compose: starts DB + Redis.
# Run the backend with: cd backend && npm run dev

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: zalo-crm-db-dev
    environment:
      POSTGRES_USER: crmuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: zalocrm
    ports:
      - "5433:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmuser"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: zalo-crm-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pg_data_dev:
  redis_data_dev:
