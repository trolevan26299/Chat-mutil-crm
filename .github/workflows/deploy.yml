name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ─── 1. Type Check ───────────────────────────────────────────────────────────
  test:
    name: 🧪 TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend

  # ─── 2. Build image (parallel) ───────────────────────────────────────────────
  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: push
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ secrets.ECR_REPO_APP }}
        run: |
          docker build \
            -f docker/Dockerfile \
            -t $ECR_REGISTRY/$REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$REPO:latest \
            .
          docker push $ECR_REGISTRY/$REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$REPO:latest
          echo "image=$ECR_REGISTRY/$REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─── 3. DB Migration (chạy trước deploy, 1 lần) ─────────────────────────────
  migrate:
    name: 🗄️ DB Migration
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run prisma migrate deploy (ECS one-off task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition chatcrm-api \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNETS }}],securityGroups=[${{ secrets.ECS_SG }}],assignPublicIp=DISABLED}" \
            --overrides '{
              "containerOverrides": [{
                "name": "chatcrm-app",
                "command": ["npx", "prisma", "migrate", "deploy"],
                "environment": [{"name":"WORKER_MODE","value":"false"}]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER }} --tasks $TASK_ARN

          EXIT=$(aws ecs describe-tasks \
            --cluster ${{ secrets.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)

          [ "$EXIT" = "0" ] && echo "✅ Migration OK" || (echo "❌ Migration failed: $EXIT" && exit 1)

  # ─── 4. Deploy API service (stateless, scale-able) ───────────────────────────
  deploy-api:
    name: 🚀 Deploy API
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition chatcrm-api \
            --query taskDefinition > .aws/task-def-api.json

      - name: Update image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-api.json
          container-name: chatcrm-app
          image: ${{ needs.build.outputs.image }}

      - name: Deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_API }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ─── 5. Deploy Worker service (stateful, fixed 1 instance) ───────────────────
  deploy-worker:
    name: 🚀 Deploy Worker
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition chatcrm-worker \
            --query taskDefinition > .aws/task-def-worker.json

      - name: Update image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-def-worker.json
          container-name: chatcrm-app
          image: ${{ needs.build.outputs.image }}

      - name: Deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_WORKER }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ─── 6. Notify kết quả ───────────────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-worker]
    if: always()
    steps:
      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ (needs.deploy-api.result == 'success' && needs.deploy-worker.result == 'success') && '✅' || '❌' }} Deploy Production

            📦 Commit: ${{ github.sha }}
            👤 By: ${{ github.actor }}
            💬 ${{ github.event.head_commit.message }}

            API: ${{ needs.deploy-api.result }}
            Worker: ${{ needs.deploy-worker.result }}

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
